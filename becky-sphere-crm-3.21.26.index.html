<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>callherbecky — Sphere CRM</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f7f5; color: #1a1a1a; min-height: 100vh; }
:root { --em: #1a7a52; --em-l: #e8f5ee; --em-d: #0f5438; --em-b: #b5ddc8; --border: rgba(0,0,0,0.1); --muted: #6b7280; --r: 10px; --rl: 14px; }
.topbar { background: var(--em-d); color: white; padding: 13px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; }
.brand-icon svg { width: 16px; height: 16px; fill: white; }
.brand-name { font-size: 17px; font-weight: 600; }
.brand-sub { font-size: 12px; opacity: 0.7; }
.topbar-btns { display: flex; gap: 8px; }
.tbtn { padding: 7px 14px; font-size: 13px; font-weight: 500; border-radius: var(--r); cursor: pointer; border: 1px solid; background: white; color: var(--em-d); border-color: rgba(255,255,255,0.4); }
.tbtn:hover { background: var(--em-l); }
.main { max-width: 1200px; margin: 0 auto; padding: 22px 16px; }
.stats-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 11px; margin-bottom: 18px; }
.stat { background: white; border-radius: var(--r); padding: 13px 16px; border: 1px solid var(--border); cursor: pointer; }
.stat:hover { border-color: var(--em-b); }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
.stat-value { font-size: 24px; font-weight: 600; }
.sv-g{color:var(--em)} .sv-r{color:#b83030} .sv-o{color:#c0720a} .sv-p{color:#7b3fa0} .sv-b{color:#1a5da0}
.btn { padding: 8px 14px; font-size: 13px; font-weight: 500; border-radius: var(--r); cursor: pointer; border: 1px solid; }
.btn-primary { background: var(--em); color: white; border-color: var(--em-d); }
.btn-primary:hover { background: var(--em-d); }
.btn-ghost { background: white; color: #333; border-color: var(--border); }
.btn-ghost:hover { background: #f0f0f0; }

.nav-tabs { display: flex; gap: 3px; border-bottom: 1px solid var(--border); margin-bottom: 16px; overflow-x: auto; }
.ntab { padding: 8px 16px; font-size: 13px; cursor: pointer; border: none; background: transparent; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; flex-shrink: 0; }
.ntab.active { color: var(--em); border-bottom-color: var(--em); font-weight: 600; }
.badge { display: inline-block; font-size: 10px; border-radius: 10px; padding: 1px 5px; margin-left: 4px; color: white; }
.bp{background:#7b3fa0} .bb{background:#1a5da0} .br{background:#b83030}
.toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.search-box { flex: 1; min-width: 200px; padding: 9px 14px; font-size: 14px; border: 1px solid var(--border); border-radius: var(--r); background: white; color: #1a1a1a; }
.search-box:focus { outline: 2px solid var(--em); outline-offset: 1px; }
.fsel { padding: 9px 12px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--r); background: white; color: #1a1a1a; cursor: pointer; }
.grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(285px,1fr)); gap: 13px; }
.card { background: white; border: 1px solid var(--border); border-radius: var(--rl); padding: 15px 17px; transition: border-color 0.15s; }
.card:hover { border-color: var(--em-b); box-shadow: 0 2px 10px rgba(26,122,82,0.07); }
.card.overdue { border-left: 3px solid #e24b4a; }
.card.due-soon { border-left: 3px solid #ef9f27; }
.ctop { display: flex; align-items: flex-start; gap: 11px; margin-bottom: 11px; }
.av { width: 40px; height: 40px; border-radius: 50%; background: var(--em-l); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; color: var(--em-d); flex-shrink: 0; }
.av.bday { background: #fff0e0; color: #7a3800; }
.cinfo { flex: 1; min-width: 0; }
.cname { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.cseg { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.seg-personal{background:#e8f0ff;color:#2d4fa8} .seg-family{background:#fde8ff;color:#7a2da8}
.seg-friend{background:#f0e8ff;color:#6b3eb8} .seg-neighbor{background:#e8fff0;color:#1a7a4a}
.seg-coworker{background:#fff4e8;color:#8a5010} .seg-hr-block{background:#fff3e0;color:#7a4000}
.seg-past-client{background:var(--em-l);color:var(--em-d)} .seg-referral{background:#fff0f4;color:#a03060}
.seg-other{background:#f0f0f0;color:#555}
.spouse-chip { font-size: 10px; background: #f0f0f8; color: #555; border-radius: 20px; padding: 2px 8px; }
.bday-chip { font-size: 10px; background: #fff0e0; color: #7a3800; border-radius: 20px; padding: 2px 8px; }
.cdetails { font-size: 12px; color: var(--muted); margin-bottom: 11px; display: flex; flex-direction: column; gap: 3px; }
.ctouch { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; margin-bottom: 10px; }
.tl { font-size: 11px; color: var(--muted); }
.tv { font-size: 11px; font-weight: 600; }
.tv-r{color:#b83030} .tv-o{color:#c0720a} .tv-g{color:var(--em)}
.cbtns { display: flex; gap: 6px; flex-wrap: wrap; }
.cbtn { padding: 4px 9px; font-size: 11px; border: 1px solid var(--border); border-radius: 7px; background: transparent; color: var(--muted); cursor: pointer; font-weight: 500; }
.cbtn:hover { background: var(--em-l); color: var(--em-d); border-color: var(--em-b); }
.cbtn.touch { background: var(--em-l); color: var(--em-d); border-color: var(--em-b); }

.cbtn.del { color: #b83030; border-color: #f0c0c0; }
.cbtn.del:hover { background: #fff0f0; border-color: #e08080; }
.cnote { font-size: 12px; color: var(--muted); margin-top: 9px; padding: 6px 9px; background: #f9fafb; border-radius: 6px; border-left: 2px solid var(--em-b); font-style: italic; line-height: 1.5; }
/* Pipeline */
.pipeline { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 11px; }
.pcol { background: #f4f7f5; border-radius: var(--rl); padding: 12px; min-height: 200px; }
.pcol-hd { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.pcount { background: white; border: 1px solid var(--border); border-radius: 20px; padding: 1px 7px; font-size: 11px; }
.plead { background: white; border: 1px solid var(--border); border-radius: var(--r); padding: 10px 12px; margin-bottom: 8px; }
.plead:hover { border-color: var(--em-b); }
.plead-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.plead-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; line-height: 1.4; }
.plead-btns { display: flex; gap: 5px; }
.pbtn { font-size: 11px; padding: 3px 8px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--muted); cursor: pointer; }
.pbtn:hover { background: var(--em-l); color: var(--em-d); border-color: var(--em-b); }
.pbtn.next { color: var(--em); border-color: var(--em-b); }
.add-lead-row { width: 100%; padding: 7px; font-size: 12px; border: 1px dashed var(--border); border-radius: var(--r); background: transparent; color: var(--muted); cursor: pointer; margin-top: 4px; }
.add-lead-row:hover { border-color: var(--em-b); color: var(--em); }
/* Birthdays */
.bsec { margin-bottom: 1.5rem; }
.bsec-title { font-size: 14px; font-weight: 600; color: var(--em-d); margin-bottom: 12px; }
.bday-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 9px; }
.bcard { background: #fff8f0; border: 1px solid #f0d0b0; border-radius: var(--r); padding: 11px 13px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
.bcard:hover { border-color: #e0a070; }
.bav { width: 34px; height: 34px; border-radius: 50%; background: #ffe0c0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #7a3800; flex-shrink: 0; }
.bname { font-size: 13px; font-weight: 600; }
.bdate { font-size: 11px; color: #8a5010; }
.bdays-lbl { font-size: 11px; font-weight: 600; color: #b83030; }
/* History */
.hentry { padding: 9px 0; border-bottom: 1px solid #f0f0f0; }
.hentry:last-child { border-bottom: none; }
.hmeta { display: flex; gap: 8px; align-items: center; margin-bottom: 3px; }
.hdate { font-size: 11px; color: var(--muted); }
.hmethod { font-size: 11px; font-weight: 500; color: var(--em); background: var(--em-l); padding: 1px 7px; border-radius: 20px; }
.hnote { font-size: 12px; color: var(--muted); font-style: italic; }

/* Modals */
.mbk { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
.mbk.open { display: flex; }
.modal { background: white; border-radius: var(--rl); padding: 24px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal-sm { max-width: 390px; }
.modal-lg { max-width: 580px; }
.mtitle { font-size: 17px; font-weight: 600; margin-bottom: 18px; color: var(--em-d); }
.fr { margin-bottom: 13px; }
.fl { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: block; font-weight: 500; }
.fi { width: 100%; padding: 9px 12px; font-size: 14px; border: 1px solid var(--border); border-radius: var(--r); background: white; color: #1a1a1a; font-family: inherit; }
.fi:focus { outline: 2px solid var(--em); outline-offset: 1px; border-color: transparent; }
.fr2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 13px; }
.mfooter { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.empty { text-align: center; padding: 3rem 1rem; color: var(--muted); grid-column: 1/-1; }
@media(max-width:700px){ .stats-row{grid-template-columns:repeat(2,1fr);} .pipeline{grid-template-columns:1fr 1fr;} }
@media(max-width:480px){ .pipeline{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
    <div><div class="brand-name">callherbecky</div><div class="brand-sub">Sphere CRM · Realty87</div></div>
  </div>
  <div class="topbar-btns">
    <button class="tbtn" onclick="exportCSV()">⬇ export CSV</button>
    <button class="tbtn" onclick="openAdd()">+ add contact</button>
  </div>
</div>

<div class="main">
  <div class="stats-row" id="stats-row"></div>
  <div class="nav-tabs">
    <button class="ntab active" id="tab-all" onclick="setTab('all',this)">all contacts</button>
    <button class="ntab" id="tab-needs" onclick="setTab('overdue',this)">needs touch <span class="badge br" id="b-over">0</span></button>
    <button class="ntab" id="tab-leads" onclick="setTab('leads',this)">hot leads <span class="badge bp" id="b-leads">0</span></button>
    <button class="ntab" id="tab-bday" onclick="setTab('bday',this)">birthdays <span class="badge bb" id="b-bday">0</span></button>
    <button class="ntab" id="tab-recent" onclick="setTab('recent',this)">recently added</button>
    <button class="ntab" id="tab-trans" onclick="setTab('transactions',this)">💰 transactions</button>
  </div>

  <div id="view-contacts">
    <div class="toolbar">
      <input class="search-box" type="text" placeholder="search name, phone, city, notes..." id="search-input" oninput="renderContacts()">
      <select class="fsel" id="seg-filter" onchange="renderContacts()">
        <option value="">all segments</option>
        <option value="personal">personal</option><option value="family">family</option><option value="friend">friend</option>
        <option value="neighbor">neighbor</option><option value="coworker">work</option><option value="hr-block">HR Block</option>
        <option value="past-client">past client</option><option value="referral">referral</option><option value="other">other</option>
      </select>
    </div>
    <div class="grid" id="contact-grid"></div>
  </div>

  <div id="view-leads" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <p style="font-size:13px;color:var(--muted)">Track potential buyers &amp; sellers through your pipeline</p>
      <button class="btn btn-primary" style="font-size:12px;padding:6px 12px" onclick="openAddLead()">+ add lead</button>
    </div>
    <div class="pipeline" id="pipeline"></div>
  </div>

  <div id="view-trans" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div id="trans-summary" style="display:flex;gap:12px;flex-wrap:wrap"></div>
      <button class="btn btn-primary" style="font-size:12px;padding:6px 12px" onclick="openAddTrans()">+ add transaction</button>
    </div>
    <div id="trans-table"></div>
  </div>

  <div id="view-bday" style="display:none">
    <div class="bsec"><div class="bsec-title">🎂 upcoming — next 60 days</div><div class="bday-grid" id="bday-60"></div></div>
    <div class="bsec"><div class="bsec-title" style="color:var(--muted)">this month</div><div class="bday-grid" id="bday-month"></div></div>
  </div>
</div>

<!-- Add/Edit Contact -->
<div class="mbk" id="m-contact">
  <div class="modal">
    <div class="mtitle" id="mc-title">add contact</div>
    <input type="hidden" id="e-id">
    <div class="fr2">
      <div><label class="fl">first name *</label><input class="fi" id="e-first"></div>
      <div><label class="fl">last name</label><input class="fi" id="e-last"></div>
    </div>
    <div class="fr"><label class="fl">segment</label>
      <select class="fi" id="e-seg">
        <option value="personal">personal</option><option value="family">family</option><option value="friend">friend</option>
        <option value="neighbor">neighbor</option><option value="coworker">work</option><option value="hr-block">HR Block</option>
        <option value="past-client">past client</option><option value="referral">referral</option><option value="other">other</option>
      </select>
    </div>
    <div class="fr2">
      <div><label class="fl">phone</label><input class="fi" id="e-phone" type="tel"></div>
      <div><label class="fl">date of birth (M/D/YYYY)</label><input class="fi" id="e-dob" placeholder="6/22/1990"></div>
    </div>
    <div class="fr"><label class="fl">email</label><input class="fi" id="e-email" type="email"></div>
    <div class="fr"><label class="fl">address line 1</label><input class="fi" id="e-addr1" placeholder="211 3rd Street East"></div>
    <div class="fr"><label class="fl">address line 2 <span style="color:var(--muted);font-weight:400">(apt, unit, etc.)</span></label><input class="fi" id="e-addr2" placeholder="Apt 4B"></div>
    <div class="fr2">
      <div><label class="fl">city</label><input class="fi" id="e-city" placeholder="Cedar Rapids"></div>
      <div><label class="fl">state</label><input class="fi" id="e-state" placeholder="IA" maxlength="2" style="text-transform:uppercase"></div>
    </div>
    <div class="fr2">
      <div><label class="fl">zip</label><input class="fi" id="e-zip" placeholder="52315" maxlength="10"></div>
      <div></div>
    </div>
    <div class="fr"><label class="fl">spouse / partner name (for reference)</label><input class="fi" id="e-spouse" placeholder="their spouse's name (display only)"></div>
    <div class="fr"><label class="fl">touch goal</label>
      <select class="fi" id="e-touch">
        <option value="30">monthly</option><option value="60">every 2 months</option>
        <option value="90" selected>quarterly</option><option value="180">every 6 months</option><option value="365">annually</option>
      </select>
    </div>
    <div class="fr"><label class="fl">notes</label><textarea class="fi" id="e-notes" rows="3"></textarea></div>
    <div class="mfooter">
      <button class="btn btn-ghost" onclick="cm('m-contact')">cancel</button>
      <button class="btn btn-primary" onclick="saveContact()">save contact</button>
    </div>
  </div>
</div>

<!-- Touch Modal -->
<div class="mbk" id="m-touch">
  <div class="modal modal-sm">
    <div class="mtitle">log a touch</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:13px" id="touch-name"></p>
    <div class="fr"><label class="fl">how did Becky reach out?</label>
      <select class="fi" id="t-method">
        <option value="text">text message</option><option value="call">phone call</option><option value="email">email</option>
        <option value="in-person">in person</option><option value="social">social media</option>
        <option value="card">handwritten card</option><option value="pop-by">pop-by / gift</option>
      </select>
    </div>
    <div class="fr"><label class="fl">note (optional)</label><textarea class="fi" id="t-note" rows="2" placeholder="What did you talk about?"></textarea></div>
    <div class="mfooter">
      <button class="btn btn-ghost" onclick="cm('m-touch')">cancel</button>
      <button class="btn btn-primary" onclick="saveTouch()">log touch</button>
    </div>
  </div>
</div>

<!-- History + AI Modal -->
<div class="mbk" id="m-hist">
  <div class="modal modal-lg">
    <div class="mtitle" id="hist-title">contact history</div>
    <div id="hist-body"></div>
    
    <div class="mfooter">
      <button class="btn btn-ghost" onclick="cm('m-hist')">close</button>
      
    </div>
  </div>
</div>

<!-- Add Lead Modal -->
<div class="mbk" id="m-lead">
  <div class="modal modal-sm">
    <div class="mtitle">add lead</div>
    <div class="fr"><label class="fl">contact</label><select class="fi" id="lead-contact"></select></div>
    <div class="fr"><label class="fl">stage</label>
      <select class="fi" id="lead-stage">
        <option value="aware">aware</option><option value="interested">interested</option>
        <option value="active">active</option><option value="closed">closed</option>
      </select>
    </div>
    <div class="fr"><label class="fl">buyer / seller</label>
      <select class="fi" id="lead-type">
        <option value="buyer">buyer</option><option value="seller">seller</option><option value="both">buyer + seller</option>
      </select>
    </div>
    <div class="fr"><label class="fl">timeline note</label><input class="fi" id="lead-note" placeholder="e.g. wants to buy summer 2026"></div>
    <div class="mfooter">
      <button class="btn btn-ghost" onclick="cm('m-lead')">cancel</button>
      <button class="btn btn-primary" onclick="saveLead()">add lead</button>
    </div>
  </div>
</div>


<!-- Transaction Modal -->
<div class="mbk" id="m-trans">
  <div class="modal" style="max-width:540px">
    <div class="mtitle" id="mt-title">add transaction</div>
    <input type="hidden" id="t-id">
    <div class="fr2">
      <div><label class="fl">client name *</label><input class="fi" id="t-client"></div>
      <div><label class="fl">close date</label><input class="fi" id="t-date" type="date"></div>
    </div>
    <div class="fr2">
      <div><label class="fl">sale price ($) *</label><input class="fi" id="t-price" type="number" placeholder="250000" oninput="calcTrans()"></div>
      <div><label class="fl">agent they worked with</label><input class="fi" id="t-agent" placeholder="Becky Oxford"></div>
    </div>
    <div class="fr2">
      <div><label class="fl">commission % <span style="color:var(--muted)">(default 3.5)</span></label><input class="fi" id="t-comm" type="number" step="0.1" value="3.5" oninput="calcTrans()"></div>
      <div><label class="fl">referral % <span style="color:var(--muted)">(0 if none)</span></label><input class="fi" id="t-ref" type="number" step="0.1" value="0" oninput="calcTrans()"></div>
    </div>
    <div class="fr2">
      <div><label class="fl">broker split — Becky keeps</label><input class="fi" id="t-split" type="number" step="1" value="70" oninput="calcTrans()"><div style="font-size:11px;color:var(--muted);margin-top:3px">broker gets the rest</div></div>
      <div><label class="fl">federal tax set-aside %</label><input class="fi" id="t-fed" type="number" step="1" value="20" oninput="calcTrans()"></div>
    </div>
    <div class="fr2">
      <div><label class="fl">state tax set-aside %</label><input class="fi" id="t-state" type="number" step="1" value="10" oninput="calcTrans()"></div>
      <div></div>
    </div>
    <!-- Live calc preview -->
    <div id="t-preview" style="background:#f4f7f5;border-radius:10px;padding:14px;margin-bottom:14px;font-size:13px;display:none">
      <div style="font-weight:600;color:var(--em-d);margin-bottom:10px">breakdown preview</div>
      <div id="t-preview-rows"></div>
    </div>
    <div class="fr"><label class="fl">notes</label><textarea class="fi" id="t-notes" rows="2" placeholder="any additional notes..."></textarea></div>
    <div class="mfooter">
      <button class="btn btn-ghost" onclick="cm('m-trans')">cancel</button>
      <button class="btn btn-primary" onclick="saveTrans()">save transaction</button>
    </div>
  </div>
</div>

<script>
const SK='becky_crm_v4', LK='becky_leads_v3', TK='becky_transactions_v1';
let contacts=[], leads=[], transactions=[], currentTab='all', touchingId=null, histId=null;

// Primary contacts from the sheet
const PRIMARY=[

// Expand spouses into separate contact cards
function buildSeed() {
  const all = [];
  PRIMARY.forEach((p, i) => {
    // Add primary contact (use spouseRef as display-only spouse field)
    const cityRaw = p.city || '';
    const cityParts = cityRaw.includes(',') ? cityRaw.split(',') : [cityRaw, ''];
    const primary = {
      id: 'p' + i,
      added: new Date().toISOString(),
      lastTouch: null,
      history: [],
      touchGoal: p.seg === 'hr-block' ? '90' : '60',
      spouse: p.spouseRef || '',
      ...p,
      city: cityParts[0].trim(),
      state: cityParts[1] ? cityParts[1].trim() : '',
    };
    delete primary.spouseRef;
    all.push(primary);

    // Add spouse as separate card if spouseRef exists and not already in PRIMARY
    if (p.spouseRef) {
      const parts = p.spouseRef.trim().split(' ');
      const spFirst = parts[0];
      const spLast = parts.slice(1).join(' ');
      // Check not already a primary contact
      const alreadyPrimary = PRIMARY.some(x => (x.first + ' ' + x.last).trim().toLowerCase() === p.spouseRef.trim().toLowerCase());
      if (!alreadyPrimary) {
        all.push({
          id: 'sp' + i,
          added: new Date().toISOString(),
          lastTouch: null,
          history: [],
          touchGoal: p.seg === 'hr-block' ? '90' : '60',
          first: spFirst,
          last: spLast,
          seg: p.seg,
          phone: p.phone || '',
          city: p.city ? p.city.split(',')[0].trim() : '',
          state: p.city && p.city.includes(',') ? p.city.split(',')[1].trim() : '',
          spouse: p.first + ' ' + p.last,
          notes: 'Spouse of ' + p.first + ' ' + p.last + (p.notes ? '. ' + p.notes : ''),
          isSpouse: true,
        });
      }
    }
  });
  return all;
}


// ── TRANSACTIONS ──────────────────────────────────────────
function fmt(n) { return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }

function calcBreakdown(price, commPct, refPct, splitPct, fedPct, statePct) {
  const totalComm   = price * (commPct / 100);
  const referral    = totalComm * (refPct / 100);
  const afterRef    = totalComm - referral;
  const beckyCut    = afterRef * (splitPct / 100);
  const brokerCut   = afterRef - beckyCut;
  const fedTax      = beckyCut * (fedPct / 100);
  const stateTax    = beckyCut * (statePct / 100);
  const totalTax    = fedTax + stateTax;
  const finalPayout = beckyCut - totalTax;
  return { totalComm, referral, afterRef, beckyCut, brokerCut, fedTax, stateTax, totalTax, finalPayout };
}

function calcTrans() {
  const price   = parseFloat(document.getElementById('t-price').value) || 0;
  const comm    = parseFloat(document.getElementById('t-comm').value) || 3.5;
  const ref     = parseFloat(document.getElementById('t-ref').value) || 0;
  const split   = parseFloat(document.getElementById('t-split').value) || 70;
  const fed     = parseFloat(document.getElementById('t-fed').value) || 20;
  const state   = parseFloat(document.getElementById('t-state').value) || 10;
  if (!price) { document.getElementById('t-preview').style.display='none'; return; }
  const b = calcBreakdown(price, comm, ref, split, fed, state);
  const broker = 100 - split;
  const rows = [
    ['sale price', fmt(price), ''],
    ['total commission ('+comm+'%)', fmt(b.totalComm), ''],
    ref > 0 ? ['referral fee ('+ref+'%)', '− '+fmt(b.referral), 'color:#b83030'] : null,
    ref > 0 ? ['after referral', fmt(b.afterRef), ''] : null,
    ['broker split ('+broker+'%)', '− '+fmt(b.brokerCut), 'color:#b83030'],
    ['Becky keeps ('+split+'%)', fmt(b.beckyCut), 'color:var(--em);font-weight:600'],
    ['federal tax set-aside ('+fed+'%)', '− '+fmt(b.fedTax), 'color:#b83030'],
    ['state tax set-aside ('+state+'%)', '− '+fmt(b.stateTax), 'color:#b83030'],
    ['total taxes', '− '+fmt(b.totalTax), 'color:#b83030'],
    ['final payout', fmt(b.finalPayout), 'color:var(--em-d);font-weight:700;font-size:15px;border-top:1px solid #ccc;padding-top:6px;margin-top:4px'],
  ].filter(Boolean);
  document.getElementById('t-preview-rows').innerHTML = rows.map(([label, val, style]) =>
    `<div style="display:flex;justify-content:space-between;padding:3px 0;${style}"><span style="color:var(--muted)">${label}</span><span style="${style}">${val}</span></div>`
  ).join('');
  document.getElementById('t-preview').style.display = 'block';
}

function openEditTrans(id) {
  const t = transactions.find(x => x.id===id); if(!t) return;
  document.getElementById('mt-title').textContent = 'edit transaction';
  document.getElementById('t-id').value = id;
  document.getElementById('t-client').value = t.client||'';
  document.getElementById('t-date').value = t.date||'';
  document.getElementById('t-agent').value = t.agent||'';
  document.getElementById('t-price').value = t.price||'';
  document.getElementById('t-comm').value = t.commPct||'3.5';
  document.getElementById('t-ref').value = t.refPct||'0';
  document.getElementById('t-split').value = t.splitPct||'70';
  document.getElementById('t-fed').value = t.fedPct||'20';
  document.getElementById('t-state').value = t.statePct||'10';
  document.getElementById('t-notes').value = t.notes||'';
  calcTrans();
  document.getElementById('m-trans').classList.add('open');
}

function saveTrans() {
  const client = document.getElementById('t-client').value.trim();
  const price  = parseFloat(document.getElementById('t-price').value);
  if (!client || !price) { alert('Client name and sale price are required.'); return; }
  const tid = document.getElementById('t-id').value;
  const data = {
    client,
    date:     document.getElementById('t-date').value,
    agent:    document.getElementById('t-agent').value.trim(),
    price,
    commPct:  parseFloat(document.getElementById('t-comm').value)||3.5,
    refPct:   parseFloat(document.getElementById('t-ref').value)||0,
    splitPct: parseFloat(document.getElementById('t-split').value)||70,
    fedPct:   parseFloat(document.getElementById('t-fed').value)||20,
    statePct: parseFloat(document.getElementById('t-state').value)||10,
    notes:    document.getElementById('t-notes').value.trim(),
  };
  if (tid) {
    const i = transactions.findIndex(x=>x.id===tid);
    if (i>=0) transactions[i] = {...transactions[i], ...data};
  } else {
    transactions.push({id:'t'+Date.now(), added:new Date().toISOString(), ...data});
  }
  saveT(); cm('m-trans'); renderTransactions();
}

function delTrans(id) {
  if (!confirm('Remove this transaction?')) return;
  transactions = transactions.filter(t=>t.id!==id);
  saveT(); renderTransactions();
}

function exportTransCSV(id) {
  const t = id ? transactions.filter(x=>x.id===id) : transactions;
  if (!t.length) { alert('No transactions.'); return; }
  const h = ['Client','Date','Agent','Sale Price','Commission %','Total Commission','Referral %','Referral Fee','Broker Split %','Broker Gets','Becky Keeps','Federal Tax %','Federal Tax','State Tax %','State Tax','Total Taxes','Final Payout','Notes'];
  const rows = t.map(tr => {
    const b = calcBreakdown(tr.price,tr.commPct,tr.refPct,tr.splitPct,tr.fedPct,tr.statePct);
    return [tr.client,tr.date||'',tr.agent||'',tr.price,tr.commPct,b.totalComm.toFixed(2),tr.refPct,b.referral.toFixed(2),(100-tr.splitPct),b.brokerCut.toFixed(2),b.beckyCut.toFixed(2),tr.fedPct,b.fedTax.toFixed(2),tr.statePct,b.stateTax.toFixed(2),b.totalTax.toFixed(2),b.finalPayout.toFixed(2),tr.notes||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"');
  });
  const csv = [h.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='becky-transactions-'+new Date().toISOString().slice(0,10)+'.csv'; a.click(); URL.revokeObjectURL(url);
}

function load() {
  try { const r = localStorage.getItem(SK); if (r) contacts = JSON.parse(r); else seed(); } catch(e) { seed(); }
  try { const rt = localStorage.getItem(TK); if (rt) transactions = JSON.parse(rt); else { transactions = []; saveT(); } } catch(e) { transactions = []; }
  try { const r = localStorage.getItem(LK); if (r) { leads = JSON.parse(r); if (leads.length === 0) { leads = SEED_LEADS; saveL(); } } else { leads = SEED_LEADS; saveL(); } } catch(e) { leads = SEED_LEADS; saveL(); }
  render();
}
function seed() { contacts = buildSeed(); saveC(); }
function saveC() { try { localStorage.setItem(SK, JSON.stringify(contacts)); } catch(e) {} }
function saveL() { try { localStorage.setItem(LK, JSON.stringify(leads)); } catch(e) {} }
function saveT() { try { localStorage.setItem(TK, JSON.stringify(transactions)); } catch(e) {} }

function ini(c) { return ((c.first||'?')[0] + (c.last||'?')[0]).toUpperCase(); }
function segL(s) { return {personal:'personal',family:'family',friend:'friend',neighbor:'neighbor',coworker:'work','hr-block':'HR Block','past-client':'past client',referral:'referral',other:'other'}[s]||'other'; }

// FIXED birthday parser — handles M/D/YYYY, MM/DD/YYYY robustly
function dbu(dob) {
  if (!dob || typeof dob !== 'string') return null;
  try {
    const parts = dob.trim().split('/');
    if (parts.length < 2) return null;
    const month = parseInt(parts[0], 10) - 1; // 0-indexed
    const day = parseInt(parts[1], 10);
    if (isNaN(month) || isNaN(day)) return null;
    const now = new Date();
    const thisYear = now.getFullYear();
    let next = new Date(thisYear, month, day);
    // if birthday already passed this year, use next year
    if (next.getTime() < now.setHours(0,0,0,0)) {
      next = new Date(thisYear + 1, month, day);
    }
    return Math.ceil((next.getTime() - Date.now()) / 86400000);
  } catch(e) { return null; }
}

function bdayStr(dob) {
  if (!dob) return '';
  const p = dob.split('/');
  const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const m = parseInt(p[0], 10) - 1;
  return (mn[m] || '') + ' ' + parseInt(p[1], 10);
}

function dsi(iso) { if (!iso) return null; return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000); }

function tss(c) {
  if (!c.lastTouch) return {label:'never contacted', cls:'tv-r', p:0};
  const d = dsi(c.lastTouch), g = parseInt(c.touchGoal || 90);
  if (d > g) return {label: d+'d ago — overdue', cls:'tv-r', p:0};
  if (d > g * 0.8) return {label: d+'d ago — due soon', cls:'tv-o', p:1};
  return {label: d+'d ago — on track', cls:'tv-g', p:2};
}

function cardCls(c) { const p = tss(c).p; return 'card' + (p===0?' overdue':p===1?' due-soon':''); }

function filtered() {
  const q = (document.getElementById('search-input').value||'').toLowerCase();
  const seg = document.getElementById('seg-filter').value;
  let list = contacts.slice();
  if (q) list = list.filter(c =>
    (c.first+' '+c.last).toLowerCase().includes(q) ||
    (c.phone||'').includes(q) ||
    (c.email||'').toLowerCase().includes(q) ||
    (c.city||'').toLowerCase().includes(q) ||
    (c.notes||'').toLowerCase().includes(q)
  );
  if (seg) list = list.filter(c => c.seg === seg);
  if (currentTab === 'overdue') list = list.filter(c => tss(c).p === 0);
  if (currentTab === 'recent') list = [...list].sort((a,b) => new Date(b.added)-new Date(a.added)).slice(0,20);
  return list.sort((a,b) => tss(a).p - tss(b).p);
}

function renderStats() {
  const total = contacts.length;
  const ov = contacts.filter(c => tss(c).p===0).length;
  const soon = contacts.filter(c => tss(c).p===1).length;
  const lc = leads.filter(l => l.stage!=='closed').length;
  const bc = contacts.filter(c => { const d = dbu(c.dob); return d !== null && d <= 30; }).length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat" onclick="setTab('all',document.getElementById('tab-all'))"><div class="stat-label">total contacts</div><div class="stat-value sv-g">${total}</div></div>
    <div class="stat" onclick="setTab('overdue',document.getElementById('tab-needs'))"><div class="stat-label">needs touch</div><div class="stat-value sv-r">${ov}</div></div>
    <div class="stat"><div class="stat-label">due soon</div><div class="stat-value sv-o">${soon}</div></div>
    <div class="stat" onclick="setTab('leads',document.getElementById('tab-leads'))"><div class="stat-label">active leads</div><div class="stat-value sv-p">${lc}</div></div>
    <div class="stat" onclick="setTab('bday',document.getElementById('tab-bday'))"><div class="stat-label">bdays (30d)</div><div class="stat-value sv-b">${bc}</div></div>`;
  document.getElementById('b-over').textContent = ov;
  document.getElementById('b-leads').textContent = lc;
  document.getElementById('b-bday').textContent = bc;
}

function renderContacts() {
  const list = filtered();
  const grid = document.getElementById('contact-grid');
  if (!list.length) { grid.innerHTML='<div class="empty"><p>no contacts match</p></div>'; return; }
  grid.innerHTML = list.map(c => {
    const ts = tss(c);
    const d = dbu(c.dob);
    const isBd = d !== null && d <= 14;
    const note = c.notes ? `<div class="cnote">${c.notes.substring(0,100)}${c.notes.length>100?'…':''}</div>` : '';
    const ll = c.history && c.history.length ? `<div style="font-size:11px;color:var(--muted);font-style:italic;margin-top:2px">${c.history[c.history.length-1].method}: ${(c.history[c.history.length-1].note||'').substring(0,45)}</div>` : '';
    const chips = `<div class="chips">
      <span class="cseg seg-${c.seg||'other'}">${segL(c.seg)}</span>
      ${c.spouse ? `<span class="spouse-chip">+ ${c.spouse}</span>` : ''}
      ${isBd ? `<span class="bday-chip">🎂 ${d===0?'today!':d===1?'tomorrow':d+'d'}</span>` : ''}
      ${c.isSpouse ? `<span style="font-size:10px;background:#f0f8ff;color:#1a5da0;border-radius:20px;padding:2px 8px;">spouse</span>` : ''}
    </div>`;
    return `<div class="${cardCls(c)}">
      <div class="ctop">
        <div class="av${isBd?' bday':''}">${ini(c)}</div>
        <div class="cinfo"><div class="cname">${c.first} ${c.last}</div>${chips}</div>
      </div>
      <div class="cdetails">
        ${c.phone?`<div>📞 ${c.phone}</div>`:''}
        ${c.email?`<div>✉ ${c.email}</div>`:''}
        ${(c.addr1||c.city)?`<div>📍 ${[c.addr1, c.addr2, c.city, c.state, c.zip].filter(Boolean).join(', ')}</div>`:''}
        ${ll}
      </div>
      <div class="ctouch"><span class="tl">last touch</span><span class="tv ${ts.cls}">${ts.label}</span></div>
      <div class="cbtns">
        <button class="cbtn" onclick="openEdit('${c.id}')">edit</button>
        <button class="cbtn touch" onclick="openTouch('${c.id}')">log touch</button>
        <button class="cbtn" onclick="openHist('${c.id}')">history</button>
        
        <button class="cbtn del" onclick="delC('${c.id}')">delete</button>
      </div>${note}
    </div>`;
  }).join('');
}

function renderPipeline() {
  const stages = ['aware','interested','active','closed'];
  const labels = {aware:'Aware',interested:'Interested',active:'Active',closed:'Closed ✓'};
  document.getElementById('pipeline').innerHTML = stages.map(s => {
    const sl = leads.filter(l => l.stage===s);
    return `<div class="pcol"><div class="pcol-hd">${labels[s]}<span class="pcount">${sl.length}</span></div>
      ${sl.map(l=>`<div class="plead">
        <div class="plead-name">${l.contactName}</div>
        <div class="plead-meta">${l.type} · ${l.note||''}</div>
        <div class="plead-btns">
          <select class="pbtn" onchange="pStage('${l.id}',this.value)" style="cursor:pointer;flex:1">
            <option value="aware" ${l.stage==='aware'?'selected':''}>aware</option>
            <option value="interested" ${l.stage==='interested'?'selected':''}>interested</option>
            <option value="active" ${l.stage==='active'?'selected':''}>active</option>
            <option value="closed" ${l.stage==='closed'?'selected':''}>closed</option>
          </select>
          <button class="pbtn" onclick="pDel('${l.id}')">remove</button>
        </div></div>`).join('')}
      <button class="add-lead-row" onclick="openAddLead('${s}')">+ add</button>
    </div>`;
  }).join('');
}

function renderBdays() {
  const u60 = contacts.filter(c => { const d = dbu(c.dob); return d !== null && d <= 60; }).sort((a,b) => dbu(a.dob)-dbu(b.dob));
  const u30 = contacts.filter(c => { const d = dbu(c.dob); return d !== null && d <= 30; });
  const mk = c => {
    const d = dbu(c.dob);
    const lbl = d===0?'TODAY!':d===1?'tomorrow':d+' days';
    return `<div class="bcard" onclick="openHist('${c.id}')">
      <div class="bav">${ini(c)}</div>
      <div><div class="bname">${c.first} ${c.last}</div><div class="bdate">${bdayStr(c.dob)}</div><div class="bdays-lbl">${lbl}</div></div>
    </div>`;
  };
  document.getElementById('bday-60').innerHTML = u60.length ? u60.map(mk).join('') : '<p style="color:var(--muted);font-size:13px">None in the next 60 days</p>';
  document.getElementById('bday-month').innerHTML = u30.length ? u30.map(mk).join('') : '<p style="color:var(--muted);font-size:13px">None this month</p>';
}

function render() { renderStats(); if(currentTab==='leads') renderPipeline(); else if(currentTab==='bday') renderBdays(); else renderContacts(); }

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.ntab').forEach(t => t.classList.remove('active')); if(el) el.classList.add('active');
  document.getElementById('view-contacts').style.display = (tab==='leads'||tab==='bday'||tab==='transactions') ? 'none' : 'block';
  document.getElementById('view-leads').style.display = tab==='leads' ? 'block' : 'none';
  document.getElementById('view-bday').style.display = tab==='bday' ? 'block' : 'none';
  document.getElementById('view-trans').style.display = tab==='transactions' ? 'block' : 'none';
  if(tab==='leads') renderPipeline(); else if(tab==='bday') renderBdays(); else if(tab==='transactions') renderTransactions(); else renderContacts();
}

function openAdd() {
  document.getElementById('mc-title').textContent = 'add contact';
  document.getElementById('e-id').value = '';
  ['first','last','phone','email','addr1','addr2','city','state','zip','spouse','notes','dob'].forEach(f => document.getElementById('e-'+f).value = '');
  document.getElementById('e-seg').value = 'personal';
  document.getElementById('e-touch').value = '90';
  document.getElementById('m-contact').classList.add('open');
}
function openEdit(id) {
  const c = contacts.find(x => x.id===id); if(!c) return;
  document.getElementById('mc-title').textContent = 'edit contact';
  document.getElementById('e-id').value = id;
  ['first','last','phone','email','addr1','addr2','city','state','zip','spouse','notes'].forEach(f => document.getElementById('e-'+f).value = c[f]||'');
  document.getElementById('e-dob').value = c.dob||'';
  document.getElementById('e-seg').value = c.seg||'other';
  document.getElementById('e-touch').value = c.touchGoal||'90';
  document.getElementById('m-contact').classList.add('open');
}
function cm(id) { document.getElementById(id).classList.remove('open'); }
function saveContact() {
  const first = document.getElementById('e-first').value.trim();
  if (!first) { alert('First name required'); return; }
  const eid = document.getElementById('e-id').value;
  const d = {first, last:document.getElementById('e-last').value.trim(), seg:document.getElementById('e-seg').value, phone:document.getElementById('e-phone').value.trim(), email:document.getElementById('e-email').value.trim(), addr1:document.getElementById('e-addr1').value.trim(), addr2:document.getElementById('e-addr2').value.trim(), city:document.getElementById('e-city').value.trim(), state:document.getElementById('e-state').value.trim().toUpperCase(), zip:document.getElementById('e-zip').value.trim(), spouse:document.getElementById('e-spouse').value.trim(), dob:document.getElementById('e-dob').value.trim(), touchGoal:document.getElementById('e-touch').value, notes:document.getElementById('e-notes').value.trim()};
  if (eid) { const i = contacts.findIndex(c=>c.id===eid); if(i>=0) contacts[i]={...contacts[i],...d}; }
  else contacts.push({id:Date.now().toString(), added:new Date().toISOString(), lastTouch:null, history:[], ...d});
  saveC(); cm('m-contact'); render();
}
function delC(id) { if(!confirm('Remove this contact?')) return; contacts=contacts.filter(c=>c.id!==id); saveC(); render(); }
function openTouch(id) {
  touchingId = id; const c = contacts.find(x=>x.id===id);
  document.getElementById('touch-name').textContent = c.first+' '+c.last;
  document.getElementById('t-method').value = 'text'; document.getElementById('t-note').value = '';
  document.getElementById('m-touch').classList.add('open');
}
function saveTouch() {
  if(!touchingId) return;
  const i = contacts.findIndex(c=>c.id===touchingId); if(i<0) return;
  const e = {date:new Date().toISOString(), method:document.getElementById('t-method').value, note:document.getElementById('t-note').value.trim()};
  contacts[i].lastTouch = e.date;
  if (!contacts[i].history) contacts[i].history = [];
  contacts[i].history.push(e);
  saveC(); cm('m-touch'); render();
}
function openHist(id) {
  histId = id; const c = contacts.find(x=>x.id===id); if(!c) return;
  document.getElementById('hist-title').textContent = c.first+' '+c.last+' — contact history';
  const h = c.history||[];
  document.getElementById('hist-body').innerHTML = h.length
    ? [...h].reverse().map(e=>`<div class="hentry"><div class="hmeta"><span class="hdate">${new Date(e.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span><span class="hmethod">${e.method}</span></div>${e.note?`<div class="hnote">${e.note}</div>`:''}</div>`).join('')
    : '<p style="font-size:13px;color:var(--muted);padding:8px 0">No touches logged yet.</p>';
  document.getElementById('m-hist').classList.add('open');
}

function openAddLead(stage='aware') {
  const sel = document.getElementById('lead-contact');
  sel.innerHTML = contacts.map(c=>`<option value="${c.first} ${c.last}">${c.first} ${c.last}</option>`).join('');
  document.getElementById('lead-stage').value = stage;
  document.getElementById('lead-type').value = 'buyer';
  document.getElementById('lead-note').value = '';
  document.getElementById('m-lead').classList.add('open');
}
function saveLead() {
  leads.push({id:'l'+Date.now(), contactName:document.getElementById('lead-contact').value, stage:document.getElementById('lead-stage').value, type:document.getElementById('lead-type').value, note:document.getElementById('lead-note').value.trim()});
  saveL(); cm('m-lead'); renderStats(); if(currentTab==='leads') renderPipeline();
}
function pStage(id, stage) {
  const l = leads.find(x=>x.id===id); if(!l) return;
  l.stage = stage;
  saveL(); renderStats(); renderPipeline();
}
function pDel(id) { leads=leads.filter(l=>l.id!==id); saveL(); renderStats(); renderPipeline(); }
function exportCSV() {
  if(!contacts.length){alert('No contacts.');return;}
  const h=['First','Last','Segment','Phone','Email','Address 1','Address 2','City','State','Zip','Spouse','DOB','Touch Goal','Last Touch','Notes'];
  const rows = contacts.map(c=>[c.first,c.last,segL(c.seg),c.phone||'',c.email||'',c.addr1||'',c.addr2||'',c.city||'',c.state||'',c.zip||'',c.spouse||'',c.dob||'',c.touchGoal||'',c.lastTouch?new Date(c.lastTouch).toLocaleDateString():'',c.notes||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"'));
  const csv = [h.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='becky-sphere-'+new Date().toISOString().slice(0,10)+'.csv'; a.click(); URL.revokeObjectURL(url);
}
['m-contact','m-touch','m-hist','m-lead','m-trans'].forEach(id => { document.getElementById(id).addEventListener('click',e=>{if(e.target.id===id)cm(id);}); });
load();

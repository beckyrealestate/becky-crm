<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>callherbecky — Sphere CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f7f5;color:#1a1a1a;min-height:100vh}
:root{--em:#1a7a52;--em-l:#e8f5ee;--em-d:#0f5438;--em-b:#b5ddc8;--border:rgba(0,0,0,0.1);--muted:#6b7280;--r:10px;--rl:14px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.topbar{background:var(--em-d);color:white;padding:13px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center}
.brand-icon svg{width:16px;height:16px;fill:white}
.brand-name{font-size:17px;font-weight:600}
.brand-sub{font-size:12px;opacity:0.7}
.topbar-btns{display:flex;align-items:center;gap:10px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#fbbf24;display:inline-block}
.sync-dot.ok{background:#4ade80}
.sync-dot.err{background:#f87171}
.sync-lbl{font-size:11px;color:rgba(255,255,255,0.7)}
.tbtn{padding:7px 14px;font-size:13px;font-weight:500;border-radius:var(--r);cursor:pointer;border:1px solid;background:white;color:var(--em-d)}
.tbtn:hover{background:var(--em-l)}
.main{max-width:1200px;margin:0 auto;padding:22px 16px}
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:11px;margin-bottom:18px}
.stat{background:white;border-radius:var(--r);padding:13px 16px;border:1px solid var(--border);cursor:pointer}
.stat:hover{border-color:var(--em-b)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.stat-value{font-size:22px;font-weight:600}
.sv-g{color:var(--em)}.sv-r{color:#b83030}.sv-o{color:#c0720a}.sv-p{color:#7b3fa0}.sv-b{color:#1a5da0}
.btn{padding:8px 14px;font-size:13px;font-weight:500;border-radius:var(--r);cursor:pointer;border:1px solid}
.btn-p{background:var(--em);color:white;border-color:var(--em-d)}.btn-p:hover{background:var(--em-d)}
.btn-g{background:white;color:#333;border-color:var(--border)}.btn-g:hover{background:#f0f0f0}
.nav-tabs{display:flex;gap:3px;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.ntab{padding:8px 16px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0}
.ntab.active{color:var(--em);border-bottom-color:var(--em);font-weight:600}
.bdg{display:inline-block;font-size:10px;border-radius:10px;padding:1px 5px;margin-left:4px;color:white}
.bp{background:#7b3fa0}.bb{background:#1a5da0}.br{background:#b83030}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;padding:9px 14px;font-size:14px;border:1px solid var(--border);border-radius:var(--r);background:white;color:#1a1a1a}
.search-box:focus{outline:2px solid var(--em);outline-offset:1px}
.fsel{padding:9px 12px;font-size:13px;border:1px solid var(--border);border-radius:var(--r);background:white;color:#1a1a1a;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:13px}
.card{background:white;border:1px solid var(--border);border-radius:var(--rl);padding:15px 17px;transition:border-color 0.15s}
.card:hover{border-color:var(--em-b);box-shadow:0 2px 10px rgba(26,122,82,0.07)}
.card.ov{border-left:3px solid #e24b4a}
.card.ds{border-left:3px solid #ef9f27}
.ctop{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px}
.av{width:40px;height:40px;border-radius:50%;background:var(--em-l);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:var(--em-d);flex-shrink:0}
.av.bd{background:#fff0e0;color:#7a3800}
.cinfo{flex:1;min-width:0}
.cname{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.cseg{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.seg-personal{background:#e8f0ff;color:#2d4fa8}.seg-family{background:#fde8ff;color:#7a2da8}
.seg-friend{background:#f0e8ff;color:#6b3eb8}.seg-neighbor{background:#e8fff0;color:#1a7a4a}
.seg-coworker{background:#fff4e8;color:#8a5010}.seg-hr-block{background:#fff3e0;color:#7a4000}
.seg-past-client{background:var(--em-l);color:var(--em-d)}.seg-referral{background:#fff0f4;color:#a03060}
.seg-other{background:#f0f0f0;color:#555}
.sp-chip{font-size:10px;background:#f0f0f8;color:#555;border-radius:20px;padding:2px 8px}
.bd-chip{font-size:10px;background:#fff0e0;color:#7a3800;border-radius:20px;padding:2px 8px}
.cdetails{font-size:12px;color:var(--muted);margin-bottom:11px;display:flex;flex-direction:column;gap:3px}
.ctouch{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-top:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;margin-bottom:10px}
.tl{font-size:11px;color:var(--muted)}
.tv{font-size:11px;font-weight:600}
.tv-r{color:#b83030}.tv-o{color:#c0720a}.tv-g{color:var(--em)}
.cbtns{display:flex;gap:6px;flex-wrap:wrap}
.cbtn{padding:4px 9px;font-size:11px;border:1px solid var(--border);border-radius:7px;background:transparent;color:var(--muted);cursor:pointer;font-weight:500}
.cbtn:hover{background:var(--em-l);color:var(--em-d);border-color:var(--em-b)}
.cbtn.tc{background:var(--em-l);color:var(--em-d);border-color:var(--em-b)}
.cbtn.dl{color:#b83030;border-color:#f0c0c0}.cbtn.dl:hover{background:#fff0f0}
.cnote{font-size:12px;color:var(--muted);margin-top:9px;padding:6px 9px;background:#f9fafb;border-radius:6px;border-left:2px solid var(--em-b);font-style:italic;line-height:1.5}
.pipeline{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:11px}
.pcol{background:#f4f7f5;border-radius:var(--rl);padding:12px;min-height:200px}
.pcol-hd{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.pct{background:white;border:1px solid var(--border);border-radius:20px;padding:1px 7px;font-size:11px}
.plead{background:white;border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.plead:hover{border-color:var(--em-b)}
.plead-name{font-size:13px;font-weight:600;margin-bottom:3px}
.plead-meta{font-size:11px;color:var(--muted);margin-bottom:6px;line-height:1.4}
.plead-btns{display:flex;gap:5px}
.pbtn{font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer}
.pbtn:hover{background:var(--em-l);color:var(--em-d);border-color:var(--em-b)}
.add-lr{width:100%;padding:7px;font-size:12px;border:1px dashed var(--border);border-radius:var(--r);background:transparent;color:var(--muted);cursor:pointer;margin-top:4px}
.add-lr:hover{border-color:var(--em-b);color:var(--em)}
.bsec{margin-bottom:1.5rem}
.bsec-title{font-size:14px;font-weight:600;color:var(--em-d);margin-bottom:12px}
.bday-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:9px}
.bcard{background:#fff8f0;border:1px solid #f0d0b0;border-radius:var(--r);padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer}
.bcard:hover{border-color:#e0a070}
.bav{width:34px;height:34px;border-radius:50%;background:#ffe0c0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#7a3800;flex-shrink:0}
.bname{font-size:13px;font-weight:600}
.bdate{font-size:11px;color:#8a5010}
.blbl{font-size:11px;font-weight:600;color:#b83030}
.hentry{padding:9px 0;border-bottom:1px solid #f0f0f0}
.hentry:last-child{border-bottom:none}
.hmeta{display:flex;gap:8px;align-items:center;margin-bottom:3px}
.hdate{font-size:11px;color:var(--muted)}
.hmethod{font-size:11px;font-weight:500;color:var(--em);background:var(--em-l);padding:1px 7px;border-radius:20px}
.hnote{font-size:12px;color:var(--muted);font-style:italic}
.mbk{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;padding:16px}
.mbk.open{display:flex}
.modal{background:white;border-radius:var(--rl);padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.msm{max-width:390px}.mlg{max-width:580px}
.mtitle{font-size:17px;font-weight:600;margin-bottom:18px;color:var(--em-d)}
.fr{margin-bottom:13px}
.fl{font-size:12px;color:var(--muted);margin-bottom:4px;display:block;font-weight:500}
.fi{width:100%;padding:9px 12px;font-size:14px;border:1px solid var(--border);border-radius:var(--r);background:white;color:#1a1a1a;font-family:inherit}
.fi:focus{outline:2px solid var(--em);outline-offset:1px;border-color:transparent}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:13px}
.mfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);grid-column:1/-1}
@media(max-width:700px){.stats-row{grid-template-columns:repeat(3,1fr)}.pipeline{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.pipeline{grid-template-columns:1fr}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a7a52;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s,transform 0.3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="ls" style="position:fixed;inset:0;background:#f4f7f5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999">
  <div style="width:36px;height:36px;border:3px solid #b5ddc8;border-top-color:#1a7a52;border-radius:50%;animation:spin 0.8s linear infinite"></div>
  <p style="color:#6b7280;font-size:14px">Loading Becky's CRM...</p>
</div>
<div id="app" style="display:none">
<div class="topbar">
  <div class="brand">
    <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
    <div><div class="brand-name">callherbecky</div><div class="brand-sub">Sphere CRM · Realty87</div></div>
  </div>
  <div class="topbar-btns">
    <span class="sync-dot" id="sdot"></span>
    <span class="sync-lbl" id="slbl">loading...</span>
    <button class="tbtn" onclick="window.exportCSV()">⬇ CSV</button>
    <button class="tbtn" onclick="window.openAdd()">+ contact</button>
  </div>
</div>
<div class="main">
  <div class="stats-row" id="stats-row"></div>
  <div class="nav-tabs">
    <button class="ntab active" id="tab-all" onclick="window.setTab('all',this)">all contacts</button>
    <button class="ntab" id="tab-needs" onclick="window.setTab('needs',this)">needs touch <span class="bdg br" id="b-needs">0</span></button>
    <button class="ntab" id="tab-leads" onclick="window.setTab('leads',this)">hot leads <span class="bdg bp" id="b-leads">0</span></button>
    <button class="ntab" id="tab-bday" onclick="window.setTab('bday',this)">birthdays <span class="bdg bb" id="b-bday">0</span></button>
    <button class="ntab" id="tab-rec" onclick="window.setTab('recent',this)">recently added</button>
    <button class="ntab" id="tab-trans" onclick="window.setTab('trans',this)">💰 transactions</button>
  </div>
  <div id="vc">
    <div class="toolbar">
      <input class="search-box" id="si" type="text" placeholder="search name, phone, city, notes...">
      <select class="fsel" id="sf">
        <option value="">all segments</option>
        <option value="personal">personal</option><option value="family">family</option><option value="friend">friend</option>
        <option value="neighbor">neighbor</option><option value="coworker">work</option><option value="hr-block">HR Block</option>
        <option value="past-client">past client</option><option value="referral">referral</option><option value="other">other</option>
      </select>
    </div>
    <div class="grid" id="cg"></div>
  </div>
  <div id="vl" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <p style="font-size:13px;color:var(--muted)">Track buyers &amp; sellers through your pipeline</p>
      <button class="btn btn-p" style="font-size:12px;padding:6px 12px" onclick="window.openAddLead()">+ add lead</button>
    </div>
    <div class="pipeline" id="pl"></div>
  </div>
  <div id="vb" style="display:none">
    <div class="bsec"><div class="bsec-title">🎂 birthdays — 30 days ahead &amp; 7 days past</div><div class="bday-grid" id="b60"></div></div>

  </div>
  <div id="vt" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div id="tsumm" style="display:flex;gap:12px;flex-wrap:wrap"></div>
      <button class="btn btn-p" style="font-size:12px;padding:6px 12px" onclick="window.openAddTrans()">+ add transaction</button>
    </div>
    <div id="ttbl"></div>
  </div>
</div>
</div>

<!-- Contact Modal -->
<div class="mbk" id="mc"><div class="modal">
  <div class="mtitle" id="mc-ttl">add contact</div>
  <input type="hidden" id="e-id">
  <div class="fr2">
    <div><label class="fl">first name *</label><input class="fi" id="e-first"></div>
    <div><label class="fl">last name</label><input class="fi" id="e-last"></div>
  </div>
  <div class="fr"><label class="fl">segment</label>
    <select class="fi" id="e-seg">
      <option value="personal">personal</option><option value="family">family</option><option value="friend">friend</option>
      <option value="neighbor">neighbor</option><option value="coworker">work</option><option value="hr-block">HR Block</option>
      <option value="past-client">past client</option><option value="referral">referral</option><option value="other">other</option>
    </select>
  </div>
  <div class="fr2">
    <div><label class="fl">phone</label><input class="fi" id="e-phone" type="tel"></div>
    <div><label class="fl">date of birth (M/D/YYYY)</label><input class="fi" id="e-dob" placeholder="6/22/1990"></div>
  </div>
  <div class="fr"><label class="fl">email</label><input class="fi" id="e-email" type="email"></div>
  <div class="fr"><label class="fl">address line 1</label><input class="fi" id="e-a1"></div>
  <div class="fr"><label class="fl">address line 2</label><input class="fi" id="e-a2"></div>
  <div class="fr2">
    <div><label class="fl">city</label><input class="fi" id="e-city"></div>
    <div><label class="fl">state</label><input class="fi" id="e-state" maxlength="2"></div>
  </div>
  <div class="fr2">
    <div><label class="fl">zip</label><input class="fi" id="e-zip" maxlength="10"></div>
    <div><label class="fl">spouse / partner</label><input class="fi" id="e-spouse"></div>
  </div>
  <div class="fr"><label class="fl">touch goal cadence</label>
    <select class="fi" id="e-tg">
      <option value="30">monthly</option><option value="60">every 2 months</option>
      <option value="90" selected>quarterly</option><option value="180">every 6 months</option><option value="365">annually</option>
    </select>
  </div>
  <div class="fr2">
    <div><label class="fl">specific follow-up date</label><input class="fi" id="e-fd" type="date"></div>
    <div><label class="fl">follow-up reason</label><input class="fi" id="e-fn" placeholder="e.g. call about listing"></div>
  </div>
  <div class="fr"><label class="fl">notes</label><textarea class="fi" id="e-notes" rows="3"></textarea></div>
  <div class="mfoot">
    <button class="btn btn-g" onclick="window.cm('mc')">cancel</button>
    <button class="btn btn-p" onclick="window.saveContact()">save contact</button>
  </div>
</div></div>

<!-- Touch Modal -->
<div class="mbk" id="mt"><div class="modal msm">
  <div class="mtitle">log a touch</div>
  <p style="font-size:13px;color:var(--muted);margin-bottom:13px" id="tname"></p>
  <div class="fr"><label class="fl">how did Becky reach out?</label>
    <select class="fi" id="t-method">
      <option value="text">text message</option><option value="call">phone call</option><option value="email">email</option>
      <option value="in-person">in person</option><option value="social">social media</option>
      <option value="card">handwritten card</option><option value="pop-by">pop-by / gift</option>
    </select>
  </div>
  <div class="fr"><label class="fl">note (optional)</label><textarea class="fi" id="t-note" rows="2" placeholder="What did you talk about?"></textarea></div>
  <div class="mfoot">
    <button class="btn btn-g" onclick="window.cm('mt')">cancel</button>
    <button class="btn btn-p" onclick="window.saveTouch()">log touch</button>
  </div>
</div></div>


<!-- Lead Modal -->
<div class="mbk" id="ml"><div class="modal msm">
  <div class="mtitle">add lead</div>
  <div class="fr"><label class="fl">contact</label><select class="fi" id="lc"></select></div>
  <div class="fr"><label class="fl">stage</label>
    <select class="fi" id="ls-sel">
      <option value="aware">aware</option><option value="interested">interested</option>
      <option value="active">active</option><option value="closed">closed</option>
    </select>
  </div>
  <div class="fr"><label class="fl">buyer / seller</label>
    <select class="fi" id="lt">
      <option value="buyer">buyer</option><option value="seller">seller</option><option value="both">buyer + seller</option>
    </select>
  </div>
  <div class="fr"><label class="fl">timeline note</label><input class="fi" id="ln" placeholder="e.g. wants to buy summer 2026"></div>
  <div class="mfoot">
    <button class="btn btn-g" onclick="window.cm('ml')">cancel</button>
    <button class="btn btn-p" onclick="window.saveLead()">add lead</button>
  </div>
</div></div>

<!-- Transaction Modal -->
<div class="mbk" id="mtr"><div class="modal" style="max-width:540px">
  <div class="mtitle" id="mtr-ttl">add transaction</div>
  <input type="hidden" id="tt-id">
  <div class="fr2">
    <div><label class="fl">client name *</label><input class="fi" id="tt-cl"></div>
    <div><label class="fl">close date</label><input class="fi" id="tt-dt" type="date"></div>
  </div>
  <div class="fr2">
    <div><label class="fl">sale price ($) *</label><input class="fi" id="tt-pr" type="number" oninput="window.calcT()"></div>
    <div><label class="fl">agent</label><input class="fi" id="tt-ag" value="Becky Oxford"></div>
  </div>
  <div class="fr2">
    <div><label class="fl">commission %</label><input class="fi" id="tt-co" type="number" step="0.1" value="3.5" oninput="window.calcT()"></div>
    <div><label class="fl">referral %</label><input class="fi" id="tt-re" type="number" step="0.1" value="0" oninput="window.calcT()"></div>
  </div>
  <div class="fr2">
    <div><label class="fl">Becky split %</label><input class="fi" id="tt-sp" type="number" value="70" oninput="window.calcT()"></div>
    <div><label class="fl">federal tax %</label><input class="fi" id="tt-fe" type="number" value="20" oninput="window.calcT()"></div>
  </div>
  <div class="fr2">
    <div><label class="fl">state tax %</label><input class="fi" id="tt-st" type="number" value="10" oninput="window.calcT()"></div>
    <div></div>
  </div>
  <div id="tp" style="background:#f4f7f5;border-radius:10px;padding:14px;margin-bottom:14px;display:none">
    <div style="font-weight:600;color:var(--em-d);margin-bottom:10px;font-size:13px">breakdown preview</div>
    <div id="tpr"></div>
  </div>
  <div class="fr"><label class="fl">notes</label><textarea class="fi" id="tt-no" rows="2"></textarea></div>
  <div class="mfoot">
    <button class="btn btn-g" onclick="window.cm('mtr')">cancel</button>
    <button class="btn btn-p" onclick="window.saveTrans()">save transaction</button>
  </div>
</div></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import{getFirestore,collection,getDocs,addDoc,updateDoc,deleteDoc,doc}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

function ini(c){return((c.first||'?')[0]+(c.last||'?')[0]).toUpperCase()}
function segL(s){return{personal:'personal',family:'family',friend:'friend',neighbor:'neighbor',coworker:'work','hr-block':'HR Block','past-client':'past client',referral:'referral',other:'other'}[s]||'other'}
function dbu(dob){
  if(!dob)return null;
  try{const p=dob.split('/');if(p.length<2)return null;
  const m=parseInt(p[0],10)-1,d=parseInt(p[1],10);if(isNaN(m)||isNaN(d))return null;
  const now=new Date();let nx=new Date(now.getFullYear(),m,d);
  const tod=new Date();tod.setHours(0,0,0,0);
  if(nx<tod)nx=new Date(now.getFullYear()+1,m,d);
  return Math.ceil((nx-Date.now())/86400000);}catch(e){return null;}
}
function bds(dob){if(!dob)return'';const p=dob.split('/');const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return(mn[parseInt(p[0],10)-1]||'')+' '+parseInt(p[1],10)}
function dbsi(dob){
  // days since last birthday (negative = hasn't happened yet, positive = passed)
  if(!dob)return null;
  try{const p=dob.split('/');if(p.length<2)return null;
  const m=parseInt(p[0],10)-1,d=parseInt(p[1],10);if(isNaN(m)||isNaN(d))return null;
  const now=new Date();
  const thisYr=new Date(now.getFullYear(),m,d);
  const today=new Date();today.setHours(0,0,0,0);
  return Math.floor((today-thisYr)/86400000);
  }catch(e){return null;}
}
function bdayInWindow(c){
  // Show if birthday is within 30 days ahead OR within 7 days past
  const daysBefore=dbu(c.dob);  // days until next bday
  const daysSince=dbsi(c.dob);  // days since this year's bday (positive = passed)
  if(daysBefore!==null&&daysBefore<=30)return true;  // coming up in 30 days
  if(daysSince!==null&&daysSince>=0&&daysSince<=7)return true;  // passed within 7 days
  return false;
}
function dsi(iso){if(!iso)return null;return Math.floor((Date.now()-new Date(iso))/86400000)}
function fl(c){
  if(!c.followupDate)return'';
  const fu=new Date(c.followupDate+'T12:00:00'),tod=new Date();tod.setHours(0,0,0,0);
  const ov=fu<tod,col=ov?'#b83030':'#1a5da0';
  return'<div style="font-size:11px;font-weight:500;color:'+col+'">📅 follow up: '+fu.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+(c.followupNote?' — '+c.followupNote:'')+'</div>';
}
function tss(c){
  if(c.followupDate){
    const fu=new Date(c.followupDate+'T12:00:00'),tod=new Date();tod.setHours(0,0,0,0);
    const du=Math.ceil((fu-tod)/86400000);
    if(du<0)return{label:'follow-up overdue',cls:'tv-r',p:0};
    if(du===0)return{label:'follow-up today!',cls:'tv-r',p:0};
    if(du<=7)return{label:'follow-up in '+du+'d',cls:'tv-o',p:1};
  }
  if(!c.lastTouch)return{label:'never contacted',cls:'tv-r',p:0};
  const d=dsi(c.lastTouch),g=parseInt(c.touchGoal||90);
  if(d>g)return{label:d+'d ago — overdue',cls:'tv-r',p:0};
  if(d>g*.8)return{label:d+'d ago — due soon',cls:'tv-o',p:1};
  return{label:d+'d ago — on track',cls:'tv-g',p:2};
}
function fmt(n){return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function cb(pr,co,re,sp,fe,st){
  const tc=pr*(co/100),ref=tc*(re/100),ar=tc-ref,bk=ar*(sp/100),br=ar-bk,ft=bk*(fe/100),sx=bk*(st/100),tx=ft+sx;
  return{tc,ref,ar,bk,br,ft,sx,tx,fp:bk-tx};
}

function filtered(){
  const q=(document.getElementById('si').value||'').toLowerCase();
  const seg=document.getElementById('sf').value;
  let list=contacts.slice();
  if(q)list=list.filter(c=>(c.first+' '+c.last).toLowerCase().includes(q)||(c.phone||'').includes(q)||(c.email||'').toLowerCase().includes(q)||(c.city||'').toLowerCase().includes(q)||(c.notes||'').toLowerCase().includes(q)||(c.addr1||'').toLowerCase().includes(q));
  if(seg)list=list.filter(c=>c.seg===seg);
  if(tab==='needs')list=list.filter(c=>tss(c).p===0||!c.lastTouch);
  if(tab==='never')list=list.filter(c=>!c.lastTouch);
  if(tab==='pastdue')list=list.filter(c=>c.lastTouch&&tss(c).p===0);
  if(tab==='soon')list=list.filter(c=>tss(c).p===1);
  if(tab==='recent')list=[...list].sort((a,b)=>new Date(b.added)-new Date(a.added)).slice(0,20);
  // For needs/filter tabs sort by urgency, for all others sort A-Z by last name
  const urgencyTabs=['needs','never','pastdue','soon'];
  if(urgencyTabs.includes(tab)){
    return list.sort((a,b)=>tss(a).p-tss(b).p);
  }
  return list.sort((a,b)=>{
    const la=(a.last||a.first||'').toLowerCase();
    const lb=(b.last||b.first||'').toLowerCase();
    return la<lb?-1:la>lb?1:0;
  });
}

function renderBdays(){
  const bdayTouched=c=>{
    if(!c.history||!c.history.length)return false;
    const yr=new Date().getFullYear();
    return c.history.some(h=>h.note&&h.note.includes('🎂')&&new Date(h.date).getFullYear()===yr);
  };
  const sortFn=(a,b)=>{
    const ad=bdayTouched(a)?1:0,bd=bdayTouched(b)?1:0;
    if(ad!==bd)return ad-bd;
    return (dbu(a.dob)||999)-(dbu(b.dob)||999);
  };
  const u60=contacts.filter(c=>bdayInWindow(c)).sort(sortFn);

  const mk=c=>{
    const d=dbu(c.dob),ds=dbsi(c.dob);
    let lbl='';
    if(d===0)lbl='TODAY!';
    else if(d!==null&&d<=30)lbl=(d===1?'tomorrow':d+' days away');
    else if(ds!==null&&ds>0&&ds<=7)lbl=ds+' days ago';
    const done=bdayTouched(c);
    const addr=[c.addr1,c.addr2,c.city,c.state,c.zip].filter(Boolean).join(', ');
    const dim=done?' style="opacity:0.6"':'';
    let s='<div class="bcard" data-bid="'+c.id+'"'+dim+'>';
    s+='<div class="bav">'+ini(c)+'</div>';
    s+='<div><div class="bname">'+c.first+' '+c.last+'</div>';
    s+='<div class="bdate">'+bds(c.dob)+'</div>';
    if(lbl&&!done)s+='<div class="blbl">'+lbl+'</div>';
    if(addr)s+='<div style="font-size:11px;color:#8a5010;margin-top:2px">📍 '+addr+'</div>';
    if(done)s+='<span style="font-size:11px;font-weight:600;color:#1a7a52;background:#e8f5ee;border-radius:20px;padding:2px 8px;margin-top:3px;display:inline-block">✓ sent</span>';
    s+='</div></div>';
    return s;
  };
  document.getElementById('b60').innerHTML=u60.length?u60.map(mk).join(''):'<p style="color:var(--muted);font-size:13px">None in the next 30 days</p>';

  ['b60'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.onclick=function(e){var card=e.target.closest('[data-bid]');if(card)window.openBday(card.dataset.bid);};
  });
}

function renderTrans(){
  const ts=transactions.reduce((s,t)=>s+t.price,0);
  const tp=transactions.reduce((s,t)=>s+cb(t.price,t.co,t.re,t.sp,t.fe,t.st).fp,0);
  const tt=transactions.reduce((s,t)=>s+cb(t.price,t.co,t.re,t.sp,t.fe,t.st).tx,0);
  document.getElementById('tsumm').innerHTML=
    '<div class="stat" style="min-width:120px"><div class="stat-label">transactions</div><div class="stat-value sv-g">'+transactions.length+'</div></div>'+
    '<div class="stat" style="min-width:160px"><div class="stat-label">total sales</div><div class="stat-value sv-b" style="font-size:18px">'+fmt(ts)+'</div></div>'+
    '<div class="stat" style="min-width:160px"><div class="stat-label">total payout</div><div class="stat-value sv-g" style="font-size:18px">'+fmt(tp)+'</div></div>'+
    '<div class="stat" style="min-width:140px"><div class="stat-label">taxes aside</div><div class="stat-value sv-r" style="font-size:18px">'+fmt(tt)+'</div></div>';
  const el=document.getElementById('ttbl');
  if(!transactions.length){el.innerHTML='<div class="empty"><p>no transactions yet</p><p style="font-size:13px;margin-top:6px">click "+ add transaction" to record your first sale</p></div>';return;}
  const sorted=[...transactions].sort((a,b)=>new Date(b.date||b.added)-new Date(a.date||a.added));
  el.innerHTML=sorted.map(t=>{
    const b=cb(t.price,t.co,t.re,t.sp,t.fe,t.st);
    const brok=100-t.sp;
    const ds=t.date?new Date(t.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
    let rows=[['sale price',fmt(t.price),''],['total commission',fmt(b.tc)+' ('+t.co+'%)','']];

    rows.push(['broker cut',fmt(b.br)+' ('+brok+'%)','#b83030'],['Becky keeps',fmt(b.bk)+' ('+t.sp+'%)','var(--em)'],['federal tax',fmt(b.ft)+' ('+t.fe+'%)','#b83030'],['state tax',fmt(b.sx)+' ('+t.st+'%)','#b83030'],['total taxes',fmt(b.tx),'#b83030']);
    const grid=rows.map(([lbl,val,col])=>'<div style="background:#f9fafb;border-radius:8px;padding:8px 10px"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px">'+lbl+'</div><div style="font-size:13px;font-weight:600;color:'+(col||'#1a1a1a')+'">'+val+'</div></div>').join('');
    return'<div style="background:white;border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;margin-bottom:12px">'+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px">'+
      '<div><div style="font-size:16px;font-weight:600">'+t.cl+'</div><div style="font-size:12px;color:var(--muted);margin-top:3px">'+ds+' · '+(t.ag||'—')+'</div>'+(t.no?'<div style="font-size:12px;color:var(--muted);font-style:italic;margin-top:3px">'+t.no+'</div>':'')+'</div>'+
      '<div style="text-align:right"><div style="font-size:22px;font-weight:700;color:var(--em-d)">'+fmt(b.fp)+'</div><div style="font-size:11px;color:var(--muted)">final payout</div></div></div>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;padding-top:12px;border-top:1px solid #f0f0f0;margin-bottom:12px">'+grid+'</div>'+

  }).join('');
}

};

    followupDate:document.getElementById('e-fd').value,followupNote:document.getElementById('e-fn').value.trim(),
    notes:document.getElementById('e-notes').value.trim()};
  if(eid){await fup('contacts',eid,d);const i=contacts.findIndex(c=>c.id===eid);if(i>=0)contacts[i]={...contacts[i],...d};}
  else{const nid=await fad('contacts',{...d,lastTouch:null,history:[],added:new Date().toISOString()});contacts.push({id:nid,...d,lastTouch:null,history:[],added:new Date().toISOString()});}
  window.cm('mc');render();toast(eid?'Contact updated ✓':'Contact saved ✓');
};

window.delC=async function(id){
  if(!confirm('Remove this contact?'))return;

};

window.openTouch=function(id){

};

window.saveTouch=async function(){
  if(!tid)return;const i=contacts.findIndex(c=>c.id===tid);if(i<0)return;
  const e={date:new Date().toISOString(),method:document.getElementById('t-method').value,note:document.getElementById('t-note').value.trim()};
  const history=[...(contacts[i].history||[]),e];
  await fup('contacts',tid,{lastTouch:e.date,history,followupDate:'',followupNote:''});
  contacts[i].lastTouch=e.date;contacts[i].history=history;contacts[i].followupDate='';contacts[i].followupNote='';
  window.cm('mt');render();toast('Touch logged ✓');
};

window.openHist=function(id){ window.openDetail(id); };

window.openAddLead=function(stage){

window.saveLead=async function(){

window.pStage=async function(id,stage){
  const l=leads.find(x=>x.id===id);if(!l)return;
  l.stage=stage;await fup('leads',id,{stage});renderStats();renderPipeline();toast('Stage updated ✓');
};

window.pDel=async function(id){
  await fdl('leads',id);leads=leads.filter(l=>l.id!==id);renderStats();renderPipeline();
};

window.calcT=function(){
  const pr=parseFloat(document.getElementById('tt-pr').value)||0;
  if(!pr){document.getElementById('tp').style.display='none';return;}
  const co=parseFloat(document.getElementById('tt-co').value)||3.5,re=parseFloat(document.getElementById('tt-re').value)||0;
  const sp=parseFloat(document.getElementById('tt-sp').value)||70,fe=parseFloat(document.getElementById('tt-fe').value)||20,st=parseFloat(document.getElementById('tt-st').value)||10;
  const b=cb(pr,co,re,sp,fe,st),brok=100-sp;
  const rows=[['sale price',fmt(pr),''],['total commission ('+co+'%)',fmt(b.tc),'']];
  if(re>0)rows.push(['referral fee ('+re+'%)','− '+fmt(b.ref),'color:#b83030']);
  rows.push(['broker ('+brok+'%)','− '+fmt(b.br),'color:#b83030'],['Becky keeps ('+sp+'%)',fmt(b.bk),'color:var(--em);font-weight:600'],['federal tax ('+fe+'%)','− '+fmt(b.ft),'color:#b83030'],['state tax ('+st+'%)','− '+fmt(b.sx),'color:#b83030'],['final payout',fmt(b.fp),'color:var(--em-d);font-weight:700;font-size:15px;border-top:1px solid #ccc;padding-top:6px']);
  document.getElementById('tpr').innerHTML=rows.map(([l,v,s])=>'<div style="display:flex;justify-content:space-between;padding:3px 0;'+s+'"><span style="color:var(--muted)">'+l+'</span><span style="'+s+'">'+v+'</span></div>').join('');
  document.getElementById('tp').style.display='block';
};

window.openAddTrans=function(){
  document.getElementById('mtr-ttl').textContent='add transaction';document.getElementById('tt-id').value='';
  document.getElementById('tt-cl').value='';document.getElementById('tt-dt').value=new Date().toISOString().slice(0,10);
  document.getElementById('tt-ag').value='Becky Oxford';document.getElementById('tt-pr').value='';
  document.getElementById('tt-co').value='3.5';document.getElementById('tt-re').value='0';
  document.getElementById('tt-sp').value='70';document.getElementById('tt-fe').value='20';
  document.getElementById('tt-st').value='10';document.getElementById('tt-no').value='';
  document.getElementById('tp').style.display='none';document.getElementById('mtr').classList.add('open');
};

window.openEditTrans=function(id){
  const t=transactions.find(x=>x.id===id);if(!t)return;
  document.getElementById('mtr-ttl').textContent='edit transaction';document.getElementById('tt-id').value=id;
  document.getElementById('tt-cl').value=t.cl||'';document.getElementById('tt-dt').value=t.date||'';
  document.getElementById('tt-ag').value=t.ag||'';document.getElementById('tt-pr').value=t.price||'';
  document.getElementById('tt-co').value=t.co||3.5;document.getElementById('tt-re').value=t.re||0;
  document.getElementById('tt-sp').value=t.sp||70;document.getElementById('tt-fe').value=t.fe||20;
  document.getElementById('tt-st').value=t.st||10;document.getElementById('tt-no').value=t.no||'';
  window.calcT();document.getElementById('mtr').classList.add('open');
};

window.saveTrans=async function(){
  const cl=document.getElementById('tt-cl').value.trim(),price=parseFloat(document.getElementById('tt-pr').value);
  if(!cl||!price){alert('Client name and sale price are required.');return;}
  const tid2=document.getElementById('tt-id').value;
  const d={cl,date:document.getElementById('tt-dt').value,ag:document.getElementById('tt-ag').value.trim(),price,
    co:parseFloat(document.getElementById('tt-co').value)||3.5,re:parseFloat(document.getElementById('tt-re').value)||0,
    sp:parseFloat(document.getElementById('tt-sp').value)||70,fe:parseFloat(document.getElementById('tt-fe').value)||20,
    st:parseFloat(document.getElementById('tt-st').value)||10,no:document.getElementById('tt-no').value.trim()};
  if(tid2){await fup('transactions',tid2,d);const i=transactions.findIndex(x=>x.id===tid2);if(i>=0)transactions[i]={...transactions[i],...d};}
  else{const nid=await fad('transactions',{...d,added:new Date().toISOString()});transactions.push({id:nid,...d,added:new Date().toISOString()});}
  window.cm('mtr');renderTrans();toast('Transaction saved ✓');
};

window.delTrans=async function(id){
  if(!confirm('Remove this transaction?'))return;
  await fdl('transactions',id);transactions=transactions.filter(t=>t.id!==id);renderTrans();
};

window.exportCSV=function(){
  if(!contacts.length){alert('No contacts.');return;}
  const h=['First','Last','Segment','Phone','Email','Address 1','Address 2','City','State','Zip','Spouse','DOB','Touch Goal','Follow-up Date','Follow-up Note','Last Touch','Notes'];
  const rows=contacts.map(c=>[c.first,c.last,segL(c.seg),c.phone||'',c.email||'',c.addr1||'',c.addr2||'',c.city||'',c.state||'',c.zip||'',c.spouse||'',c.dob||'',c.touchGoal||'',c.followupDate||'',c.followupNote||'',c.lastTouch?new Date(c.lastTouch).toLocaleDateString():'',c.notes||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"'));
  const csv=[h.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='becky-sphere-'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(url);
};

let bdayId = null;
window.openBday = function(id) {
  bdayId = id;
  const c = contacts.find(x => x.id === id); if(!c) return;
  const d = dbu(c.dob);
  const lbl = d === 0 ? 'Today!' : d === 1 ? 'Tomorrow' : 'In ' + d + ' days';
  document.getElementById('bday-cname').textContent = c.first + ' ' + c.last;
  document.getElementById('bday-cdate').textContent = bds(c.dob) + ' — ' + lbl;
  document.getElementById('bday-cphone').textContent = c.phone ? '📞 ' + c.phone : '';
  const addr = [c.addr1, c.addr2, c.city, c.state, c.zip].filter(Boolean).join(', ');
  document.getElementById('bday-caddr').textContent = addr ? '📍 ' + addr : '';
  document.getElementById('bd-method').value = 'card';
  document.getElementById('bd-note').value = '';
  document.getElementById('mbday').classList.add('open');
};

window.saveBdayTouch = async function() {
  if(!bdayId) return;
  const i = contacts.findIndex(c => c.id === bdayId); if(i < 0) return;
  const e = {
    date: new Date().toISOString(),
    method: document.getElementById('bd-method').value,
    note: '🎂 Birthday touch' + (document.getElementById('bd-note').value.trim() ? ': ' + document.getElementById('bd-note').value.trim() : '')
  };
  const history = [...(contacts[i].history || []), e];
  await fup('contacts', bdayId, {lastTouch: e.date, history});
  contacts[i].lastTouch = e.date;
  contacts[i].history = history;
  window.cm('mbday');
  render();toast('Birthday touch logged 🎂');
};


window.openDetail = function(id) {
  const c = contacts.find(x => x.id === id); if(!c) return;
  document.getElementById("det-av").textContent = ini(c);
  document.getElementById("det-name").textContent = c.first + " " + c.last;
  const sl = {personal:"personal",family:"family",friend:"friend",neighbor:"neighbor",coworker:"work","hr-block":"HR Block","past-client":"past client",referral:"referral",other:"other"};
  let chips = "<span class=\"cseg seg-"+(c.seg||"other")+"\">"+(sl[c.seg]||"other")+"</span>";
  if(c.isSpouse) chips += "<span style=\"font-size:10px;background:#f0f8ff;color:#1a5da0;border-radius:20px;padding:2px 8px\">spouse</span>";
  document.getElementById("det-chips").innerHTML = chips;
  document.getElementById("det-phone").innerHTML = c.phone ? "📞 <a href=\"tel:"+c.phone+"\" style=\"color:#1a5da0\">"+c.phone+"</a>" : "";
  document.getElementById("det-email").innerHTML = c.email ? "✉ <a href=\"mailto:"+c.email+"\" style=\"color:#1a5da0\">"+c.email+"</a>" : "";
  const addr = [c.addr1,c.addr2,c.city,c.state,c.zip].filter(Boolean).join(", ");
  document.getElementById("det-addr").innerHTML = addr ? "📍 " + addr : "";
  document.getElementById("det-dob").innerHTML = c.dob ? "🎂 " + c.dob : "";
  document.getElementById("det-spouse").innerHTML = c.spouse ? "👫 " + c.spouse : "";
  const fu = document.getElementById("det-followup");
  if(c.followupDate) {
    fu.style.display = "block";
    const d = new Date(c.followupDate+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    fu.innerHTML = "📅 Follow up: "+d+(c.followupNote?" — "+c.followupNote:"");
  } else { fu.style.display = "none"; }
  const no = document.getElementById("det-notes");
  if(c.notes){ no.style.display="block"; no.textContent=c.notes; } else { no.style.display="none"; }
  const hist = c.history||[];
  document.getElementById("det-hist").innerHTML = hist.length
    ? [...hist].reverse().map(e=>"<div class=\"hentry\"><div class=\"hmeta\"><span class=\"hdate\">"+new Date(e.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})+"</span><span class=\"hmethod\">"+e.method+"</span></div>"+(e.note?"<div class=\"hnote\">"+e.note+"</div>":"")+"</div>").join("")
    : "<p style=\"font-size:13px;color:var(--muted)\">No touches logged yet.</p>";
  document.getElementById("det-touch-btn").onclick = function(){ window.cm("mdet"); window.openTouch(id); };
  document.getElementById("det-edit-btn").onclick = function(){ window.cm("mdet"); window.openEdit(id); };
  document.getElementById("mdet").classList.add("open");
};

function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.classList.add("show");
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>el.classList.remove("show"),2500);
}

load();
</script>
